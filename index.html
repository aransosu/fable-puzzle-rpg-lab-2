<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>유키렌 퍼즐R&D 2탄 — Battle Feedback Loop 01</title>
<style>
  :root{
    --bg:#0e0b1a;
    --panel:#1a1530;
    --panel-2:#241c44;
    --cell:#161130;
    --cell-edge:#2e2554;
    --ink:#efe9ff;
    --ink-dim:#9a8fc2;
    --gold:#ffd34d;
    --glow:#7c5cff;

    --warrior:#e5564a;   /* 전사 */
    --archer:#39c46f;    /* 궁수 */
    --priest:#ffd54a;    /* 사제 */
    --rogue:#a06bff;     /* 도적 */
    --mage:#3aa6ff;      /* 마법사 */
    --enemy:#8a93a8;

    /* 2.5D 보드 기울기 (약 5~7도) */
    --tilt:7deg;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  body{
    min-height:100vh;display:flex;justify-content:center;
    background:
      radial-gradient(1200px 600px at 50% -10%, #2a2150 0%, transparent 60%),
      radial-gradient(800px 500px at 10% 110%, #1d2a4a 0%, transparent 55%),
      var(--bg);
  }
  #app{width:100%;max-width:430px;padding:12px 12px 28px;}

  /* ---- top bar ---- */
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .logo{font-weight:bold;font-size:13px;letter-spacing:.5px;color:var(--ink-dim);}
  .logo b{color:var(--gold);}
  .stage-chip{
    margin-left:auto;background:var(--panel-2);border:1px solid var(--cell-edge);
    border-radius:999px;padding:6px 12px;font-size:13px;font-weight:bold;
  }
  .stage-chip .num{color:var(--gold);}

  .title-strap{font-size:11px;color:var(--ink-dim);margin:0 0 12px;text-align:center;
    letter-spacing:.3px;}

  /* ---- status bar (Run Balance) ---- */
  .statusbar{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px;margin:0 0 8px;}
  .statusbar .stat{background:var(--panel);border:1px solid var(--cell-edge);border-radius:10px;
    padding:7px 9px;display:flex;flex-direction:column;gap:3px;}
  .statusbar .stat .k{font-size:10px;color:var(--ink-dim);letter-spacing:.3px;}
  .statusbar .stat .v{font-size:15px;font-weight:bold;color:var(--ink);}
  .boardbar{height:5px;border-radius:99px;background:#231c44;overflow:hidden;margin-top:2px;}
  .boardbar-fill{height:100%;width:0%;background:#5fe08a;border-radius:99px;transition:width .3s,background .3s;}
  .last-result{background:var(--panel-2);border:1px solid var(--cell-edge);border-radius:10px;
    padding:7px 10px;margin:0 0 10px;font-size:12px;color:var(--ink-dim);text-align:center;}
  .last-result b{font-weight:bold;}

  /* =====================================================
     전술 보드 (두께 있는 슬라브 + 칸 베벨) — 핫픽스: 3D 기울기 제거(가시성 우선)
     ===================================================== */
  .board-stage{
    position:relative;
    margin:6px 0 4px;
    padding-top:12px;            /* 부유 말 헤드룸 (3D 기울기 제거 — 가시성 우선) */
  }
  /* 슬라브(두께/측면/그림자) */
  .board-slab{
    position:relative;
    border-radius:20px;
    padding:12px;
    background:
      linear-gradient(180deg,#221a42 0%, #1b1538 60%, #16112e 100%);
    border:1px solid #34295e;
    /* 측면 두께를 box-shadow 스택으로 위조 */
    box-shadow:
      0 7px 0 #1a1436,
      0 13px 0 #140f2a,
      0 18px 0 #0f0b20,
      0 30px 34px rgba(0,0,0,.6),
      inset 0 2px 0 rgba(255,255,255,.05),
      inset 0 -10px 22px rgba(0,0,0,.45);
  }
  /* 슬라브 윗면 림(테두리 광) */
  .board-slab::before{
    content:"";position:absolute;inset:6px;border-radius:15px;
    border:1px solid rgba(124,92,255,.18);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    pointer-events:none;
  }
  #board{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);   /* 4×4=16칸 명시 */
    grid-auto-rows:1fr;
    align-content:stretch;
    gap:7px;aspect-ratio:1/1;
    /* 핫픽스: 3D rotateX/preserve-3d 제거 — 윗줄이 슬라브 배경 뒤로 가려지던 문제 해소 */
  }
  .cell{
    position:relative;
    border-radius:11px;
    background:
      radial-gradient(120% 120% at 50% 18%, #211a40 0%, #161031 70%);
    border:1px solid #2c2454;
    /* 칸을 '소켓'처럼: 안쪽으로 패인 입체 */
    box-shadow:
      inset 0 3px 6px rgba(0,0,0,.55),
      inset 0 -1px 0 rgba(255,255,255,.06),
      0 1px 0 rgba(255,255,255,.03);
    transition:box-shadow .15s, background .15s;
  }
  /* 칸 윗면 미세 하이라이트 */
  .cell::after{
    content:"";position:absolute;left:6%;right:6%;top:5%;height:34%;
    border-radius:10px 10px 40% 40%;
    background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);
    pointer-events:none;
  }
  /* 디버그 좌표(SHOW_CELL_COORDS=true일 때만 표시) */
  .cell .coord{position:absolute;top:3px;left:5px;font-size:9px;font-weight:bold;
    color:rgba(200,190,255,.5);pointer-events:none;z-index:2;}

  /* ---- 미리보기 하이라이트 ---- */
  /* 빈칸 배치 가능(선반 말 한정) */
  .cell.drop-ok{
    background:radial-gradient(120% 120% at 50% 18%, #1c2c30 0%, #142433 70%);
    box-shadow:inset 0 0 0 1.5px rgba(95,224,138,.5), inset 0 3px 6px rgba(0,0,0,.5);
  }
  /* 성장 문양 대상 칸: 직업색 은은한 빛 + 펄스 */
  .cell.glyph-hi{
    box-shadow:
      inset 0 0 0 2px color-mix(in srgb, var(--glyph,var(--gold)) 70%, transparent),
      inset 0 0 18px color-mix(in srgb, var(--glyph,var(--gold)) 55%, transparent),
      inset 0 3px 6px rgba(0,0,0,.4);
    background:radial-gradient(120% 120% at 50% 30%,
      color-mix(in srgb, var(--glyph,var(--gold)) 22%, #161031) 0%, #161031 72%);
    animation:glyphPulse 1.1s ease-in-out infinite;
  }
  @keyframes glyphPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
  /* 머지 가능 대상 칸: 금색 링 + 반짝임 (가장 강조) */
  .cell.merge-ok{
    box-shadow:
      inset 0 0 0 2.5px var(--gold),
      0 0 22px rgba(255,211,77,.55),
      inset 0 0 16px rgba(255,211,77,.35);
    background:radial-gradient(120% 120% at 50% 30%, #2a2236 0%, #181232 72%);
    animation:mergePulse .9s ease-in-out infinite;
  }
  @keyframes mergePulse{0%,100%{box-shadow:inset 0 0 0 2.5px var(--gold),0 0 14px rgba(255,211,77,.45),inset 0 0 12px rgba(255,211,77,.3)}
    50%{box-shadow:inset 0 0 0 3px var(--gold),0 0 26px rgba(255,211,77,.75),inset 0 0 20px rgba(255,211,77,.5)}}
  /* 머지 대상 칸 코너 배지 */
  .cell.merge-ok::before{
    content:"합체";position:absolute;top:3px;left:50%;transform:translateX(-50%);
    font-size:8px;font-weight:bold;letter-spacing:1px;color:#1a1206;
    background:var(--gold);border-radius:6px;padding:1px 5px;z-index:7;
    box-shadow:0 1px 4px rgba(0,0,0,.5);
  }

  /* =====================================================
     영웅 토큰 — 둥둥 떠 있는 직업별 말/아바타
     (서 있는 피규어 + 바닥 그림자 + 성급 외형 4단계)
     ===================================================== */
  .hero{
    position:absolute;inset:0;cursor:pointer;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .hero *{pointer-events:none;}
  /* 바닥 그림자(보드 평면에 눕는다 — 기울기 따라감) */
  .ground{
    position:absolute;left:50%;bottom:9%;transform:translateX(-50%);
    width:54%;height:13%;border-radius:50%;
    background:radial-gradient(closest-side, rgba(0,0,0,.55), rgba(0,0,0,0) 78%);
    animation:shadowBob 2.6s ease-in-out infinite;
  }
  @keyframes shadowBob{0%,100%{opacity:.8;transform:translateX(-50%) scale(1)}
    50%{opacity:.55;transform:translateX(-50%) scale(.86)}}
  /* 말 자세 (보드 평면화 — 기울기 상쇄 불필요) */
  .stand{
    position:relative;height:88%;width:80%;
    display:flex;align-items:flex-end;justify-content:center;
    transform-origin:bottom center;
    transform:none;
  }
  /* 둥둥 부유 */
  .float{
    position:relative;height:100%;width:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    animation:floaty 2.6s ease-in-out infinite;will-change:transform;
  }
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  /* 피규어 본체 박스 */
  .fig{
    position:relative;width:62%;height:78%;margin:0 auto;
    transform-origin:bottom center;
    transition:transform .2s;
  }
  /* 성급별 크기 단계 */
  .hero.s1 .fig{transform:scale(.86);}
  .hero.s2 .fig{transform:scale(.96);}
  .hero.s3 .fig{transform:scale(1.05);}
  .hero.s4 .fig{transform:scale(1.16);}

  /* 오라(3성 은은 / 4성 강함) */
  .aura{
    position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);
    width:150%;height:150%;border-radius:50%;opacity:0;z-index:0;
    background:radial-gradient(closest-side,
      color-mix(in srgb, var(--hc) 60%, #fff) 0%,
      color-mix(in srgb, var(--hc) 40%, transparent) 40%, transparent 72%);
    filter:blur(2px);
  }
  .hero.s3 .aura{opacity:.45;background:radial-gradient(closest-side,rgba(255,211,77,.6),rgba(255,211,77,0) 70%);}
  .hero.s4 .aura{opacity:.9;width:175%;height:175%;animation:auraPulse 1.6s ease-in-out infinite;
    background:radial-gradient(closest-side,
      color-mix(in srgb, var(--hc) 65%, #fff) 0%,
      rgba(255,211,77,.45) 45%, transparent 72%);}
  @keyframes auraPulse{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}
    50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}

  /* 망토(3성+) — 본체 뒤로 드리움 */
  .cape{
    position:absolute;left:50%;bottom:6%;transform:translateX(-50%);
    width:92%;height:62%;border-radius:36% 36% 46% 46%/30% 30% 70% 70%;
    background:linear-gradient(180deg, color-mix(in srgb,var(--hc) 55%,#000), color-mix(in srgb,var(--hc) 30%,#000));
    opacity:0;z-index:1;
  }
  .hero.s3 .cape,.hero.s4 .cape{opacity:.92;}

  /* 본체(몸통) */
  .body{
    position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:100%;height:56%;z-index:3;
    border-radius:46% 46% 38% 38%/58% 58% 42% 42%;
    background:linear-gradient(180deg,
      color-mix(in srgb,var(--hc) 35%,#fff) 0%,
      var(--hc) 42%,
      color-mix(in srgb,var(--hc) 70%,#000) 100%);
    box-shadow:inset 0 -4px 8px rgba(0,0,0,.4), inset 0 3px 5px rgba(255,255,255,.25),
      0 3px 6px rgba(0,0,0,.4);
  }
  /* 머리 */
  .head{
    position:absolute;left:50%;top:-2%;transform:translateX(-50%);
    width:62%;aspect-ratio:1/1;z-index:4;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,
      color-mix(in srgb,var(--hc) 20%,#fff) 0%,
      var(--hc) 55%,
      color-mix(in srgb,var(--hc) 72%,#000) 100%);
    box-shadow:inset 0 -3px 6px rgba(0,0,0,.35), inset 0 2px 4px rgba(255,255,255,.4);
  }
  /* 어깨 보호구(3성+) */
  .shoulders{position:absolute;left:50%;top:42%;transform:translateX(-50%);
    width:108%;height:20%;z-index:4;opacity:0;}
  .shoulders::before,.shoulders::after{content:"";position:absolute;top:0;width:34%;height:100%;
    border-radius:50%;background:linear-gradient(180deg,color-mix(in srgb,var(--hc) 50%,#000),color-mix(in srgb,var(--hc) 75%,#000));
    box-shadow:inset 0 2px 3px rgba(255,255,255,.2);}
  .shoulders::before{left:-3%;}.shoulders::after{right:-3%;}
  .hero.s3 .shoulders,.hero.s4 .shoulders{opacity:1;}

  /* 무기/도구(2성+ 표시) — 공통 컨테이너 */
  .weapon{position:absolute;z-index:5;opacity:0;}
  .hero.s2 .weapon,.hero.s3 .weapon,.hero.s4 .weapon{opacity:1;}

  /* 머리 장식(투구/후드/모자/후광) — 직업 정체성, 1성부터 단순형 노출 */
  .ornament{position:absolute;z-index:5;}

  /* 왕관(4성) */
  .crown{position:absolute;left:50%;top:-26%;transform:translateX(-50%);
    width:50%;height:24%;z-index:6;opacity:0;
    background:linear-gradient(180deg,#ffe88a,#f4b73a);
    clip-path:polygon(0% 100%,0% 35%,20% 70%,38% 10%,50% 55%,62% 10%,80% 70%,100% 35%,100% 100%);
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));}
  .hero.s4 .crown{opacity:1;}

  /* 성급 별 보조 표기(아주 작게) */
  .stars{position:absolute;left:50%;top:-14%;transform:translateX(-50%);
    display:flex;gap:1px;font-size:7px;line-height:1;color:var(--gold);z-index:6;
    text-shadow:0 1px 1px rgba(0,0,0,.6);opacity:.85;}
  .hero.s4 .stars{top:-40%;}

  /* 레벨 플레이트(숫자) — 피규어 아래, 그림자 위 */
  .lvl{
    position:relative;margin-top:-2px;z-index:6;
    font-size:9px;font-weight:bold;letter-spacing:.3px;color:#fff;
    background:linear-gradient(180deg,#2a2350,#191233);
    border:1px solid rgba(124,92,255,.5);border-radius:7px;padding:1px 6px;
    box-shadow:0 2px 5px rgba(0,0,0,.5);text-shadow:0 1px 0 #000;}
  .lvl b{color:var(--gold);}

  /* ---------- 직업별 외형 ---------- */
  /* 전사: 투구 + 검 */
  .job-warrior .ornament.helm{
    left:50%;top:-12%;transform:translateX(-50%);width:64%;height:46%;
    border-radius:50% 50% 18% 18%/72% 72% 28% 28%;
    background:linear-gradient(180deg,color-mix(in srgb,var(--hc) 30%,#000),color-mix(in srgb,var(--hc) 60%,#000));
    box-shadow:inset 0 2px 3px rgba(255,255,255,.25);}
  .job-warrior .ornament.helm::after{content:"";position:absolute;left:50%;top:-22%;transform:translateX(-50%);
    width:14%;height:46%;border-radius:3px;background:linear-gradient(180deg,#ffd34d,#c98a1e);}
  .job-warrior .weapon.sword{right:-20%;bottom:6%;width:9%;height:74%;
    background:linear-gradient(180deg,#eef1ff,#aab0c8);border-radius:3px 3px 1px 1px;
    box-shadow:0 0 4px rgba(255,255,255,.4);}
  .job-warrior .weapon.sword::before{content:"";position:absolute;left:-90%;top:62%;width:280%;height:11%;
    border-radius:2px;background:#c9a23a;}
  .job-warrior .weapon.sword::after{content:"";position:absolute;left:14%;top:74%;width:72%;height:22%;
    border-radius:2px;background:#7a5a1e;}

  /* 궁수: 머리띠 + 활 */
  .job-archer .ornament.band{left:50%;top:8%;transform:translateX(-50%);width:64%;height:12%;
    border-radius:4px;background:color-mix(in srgb,var(--hc) 55%,#000);}
  .job-archer .weapon.bow{left:-22%;bottom:8%;width:34%;height:78%;
    border:3px solid #caa24a;border-radius:50%;clip-path:inset(0 52% 0 0);
    box-shadow:0 0 4px rgba(202,162,74,.4);}
  .job-archer .weapon.bow::after{content:"";position:absolute;right:6%;top:-2%;width:2px;height:104%;
    background:rgba(255,255,255,.55);}

  /* 사제: 흰 로브 + 후광 + 십자 지팡이 */
  .job-priest .body{background:linear-gradient(180deg,#fffefb 0%,#fff6cf 50%,#e8d27a 100%);}
  .job-priest .head{background:radial-gradient(circle at 38% 32%,#fff 0%,#fff3c4 60%,#e6cf76 100%);}
  .job-priest .ornament.halo{left:50%;top:-22%;transform:translateX(-50%);width:58%;height:20%;
    border:2px solid #ffe27a;border-radius:50%;
    box-shadow:0 0 8px rgba(255,226,122,.85),inset 0 0 4px rgba(255,226,122,.7);background:transparent;}
  .job-priest .body::after{content:"✚";position:absolute;left:50%;top:38%;transform:translateX(-50%);
    font-size:11px;color:#e0a92a;font-weight:bold;}
  .job-priest .weapon.staff{right:-18%;bottom:6%;width:6%;height:80%;border-radius:3px;
    background:linear-gradient(180deg,#fff3c4,#caa24a);}
  .job-priest .weapon.staff::before{content:"✚";position:absolute;left:50%;top:-18%;transform:translateX(-50%);
    font-size:11px;color:#ffd34d;text-shadow:0 0 5px rgba(255,211,77,.9);}

  /* 도적: 후드 + 단검 */
  .job-rogue .ornament.hood{left:50%;top:-16%;transform:translateX(-50%);width:84%;height:64%;z-index:4;
    background:linear-gradient(180deg,color-mix(in srgb,var(--hc) 35%,#000),color-mix(in srgb,var(--hc) 62%,#000));
    clip-path:polygon(50% 0%,100% 42%,86% 100%,14% 100%,0% 42%);
    box-shadow:inset 0 2px 4px rgba(255,255,255,.15);}
  .job-rogue .head{filter:brightness(.82);}
  .job-rogue .weapon.dagger{right:-16%;bottom:14%;width:7%;height:42%;
    background:linear-gradient(180deg,#e7e9f5,#9aa0bc);border-radius:2px 2px 1px 1px;
    transform:rotate(8deg);}
  .job-rogue .weapon.dagger::after{content:"";position:absolute;left:-60%;top:78%;width:220%;height:14%;
    border-radius:2px;background:#5a4a7a;}

  /* 마법사: 뾰족 모자 + 구체 */
  .job-mage .ornament.wizhat{left:50%;top:-40%;transform:translateX(-50%);width:62%;height:64%;z-index:5;
    background:linear-gradient(180deg,color-mix(in srgb,var(--hc) 25%,#000) 0%,color-mix(in srgb,var(--hc) 55%,#000) 100%);
    clip-path:polygon(50% 0%,86% 100%,14% 100%);
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.4));}
  .job-mage .ornament.wizhat::before{content:"";position:absolute;left:8%;bottom:0;width:84%;height:18%;
    border-radius:3px;background:#ffd34d;}
  .job-mage .ornament.wizhat::after{content:"✦";position:absolute;left:50%;top:-14%;transform:translateX(-50%);
    font-size:9px;color:#ffe27a;text-shadow:0 0 5px rgba(255,226,122,.9);}
  .job-mage .weapon.orb{right:-20%;bottom:30%;width:24%;height:24%;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,#7fd0ff 50%,#2a78c0 100%);
    box-shadow:0 0 8px rgba(120,200,255,.9);}

  /* 선택 상태 */
  .hero.selected .float{filter:drop-shadow(0 0 8px var(--gold));}
  .hero.selected::after{content:"";position:absolute;left:50%;bottom:6%;transform:translateX(-50%);
    width:62%;height:16%;border-radius:50%;
    box-shadow:0 0 0 2px var(--gold),0 0 16px var(--gold);}

  /* 배치/머지/성장 애니 */
  .hero.pop .fig{animation:pop .42s ease;}
  @keyframes pop{0%{transform:scale(.6)}45%{transform:scale(1.28)}70%{transform:scale(.92)}100%{transform:scale(1)}}
  .hero.bump .fig{animation:bump .5s ease;}
  @keyframes bump{0%{transform:scale(1)}30%{transform:scale(1.2) translateY(-6px)}100%{transform:scale(1)}}

  /* growth wave ring */
  .wave{position:absolute;inset:6%;border-radius:14px;pointer-events:none;z-index:8;
    border:2px solid var(--glyph,var(--gold));opacity:0;}
  .wave.run{animation:wave .6s ease-out;}
  @keyframes wave{0%{opacity:.9;transform:scale(.4)}100%{opacity:0;transform:scale(1.18)}}
  /* merge flash */
  .flash{position:absolute;inset:-6px;border-radius:18px;pointer-events:none;opacity:0;z-index:8;
    background:radial-gradient(circle,#fff,transparent 60%);}
  .flash.run{animation:flash .42s ease-out;}
  @keyframes flash{0%{opacity:.9;transform:scale(.5)}100%{opacity:0;transform:scale(1.3)}}

  /* ===== 전투 후 보드 복귀 연출 ===== */
  /* 사망 칸: 붉은 그을림 pulse */
  .cell.death-fx{animation:deathScorch 1s ease-out;}
  @keyframes deathScorch{
    0%{box-shadow:inset 0 0 0 2px #ff5a4a, inset 0 0 20px rgba(255,60,50,.65), inset 0 3px 6px rgba(0,0,0,.55);
       background:radial-gradient(120% 120% at 50% 40%, #3a1414 0%, #161031 75%);}
    55%{box-shadow:inset 0 0 0 2px rgba(255,90,74,.5), inset 0 0 14px rgba(255,60,50,.4), inset 0 3px 6px rgba(0,0,0,.55);}
    100%{box-shadow:inset 0 3px 6px rgba(0,0,0,.55), inset 0 -1px 0 rgba(255,255,255,.06);
       background:radial-gradient(120% 120% at 50% 18%, #211a40 0%, #161031 70%);}
  }
  /* 사망 칸 붉은 링 + 연기 파편 */
  .death-burst{position:absolute;inset:0;pointer-events:none;z-index:9;}
  .death-burst::before{content:"";position:absolute;left:50%;top:50%;width:22%;height:22%;
    transform:translate(-50%,-50%);border-radius:50%;border:2px solid #ff5a4a;
    animation:deathRing .8s ease-out forwards;}
  @keyframes deathRing{0%{opacity:.95;width:22%;height:22%}100%{opacity:0;width:130%;height:130%}}
  .death-burst .smoke{position:absolute;bottom:20%;left:40%;width:16%;height:16%;border-radius:50%;
    background:radial-gradient(circle, rgba(150,140,160,.7), transparent 70%);
    animation:smokeUp .95s ease-out forwards;}
  .death-burst .smoke.s2{left:54%;width:13%;height:13%;animation-delay:.1s;}
  @keyframes smokeUp{0%{opacity:.7;transform:translateY(0) scale(.6)}100%{opacity:0;transform:translateY(-65%) scale(1.5)}}

  /* 생존 말: 초록/흰 반짝임 + 통통 */
  .hero.return-fx .fig{animation:survBounce .8s ease;}
  @keyframes survBounce{0%{transform:translateY(0) scale(1)}24%{transform:translateY(-10px) scale(1.12)}
    55%{transform:translateY(0) scale(.97)}100%{transform:translateY(0) scale(1)}}
  .hero.return-fx::after{content:"";position:absolute;left:50%;bottom:8%;transform:translateX(-50%);
    width:70%;height:18%;border-radius:50%;z-index:9;pointer-events:none;
    box-shadow:0 0 0 2px rgba(150,255,170,.75), 0 0 16px rgba(180,255,200,.7);
    animation:survGlow .8s ease-out forwards;}
  @keyframes survGlow{0%{opacity:.95}100%{opacity:0}}
  /* 사제 생존: 회복 지원 느낌 추가 반짝임 */
  .hero.heal-glow .fig{filter:drop-shadow(0 0 7px rgba(155,255,176,.95));}

  /* ---- legend ---- */
  .legend{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:18px 0 0;}
  .legend .j{background:var(--panel);border:1px solid var(--cell-edge);border-radius:10px;
    padding:6px 2px;text-align:center;font-size:10px;color:var(--ink-dim);}
  .legend .j .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-bottom:3px;}
  .legend .j .pat{font-size:9px;color:var(--ink);}

  /* ---- tray ---- */
  .section-label{font-size:11px;color:var(--ink-dim);text-transform:uppercase;
    letter-spacing:1px;margin:14px 4px 6px;display:flex;align-items:center;gap:6px;}
  .section-label .count{margin-left:auto;color:var(--ink);background:var(--panel-2);
    border-radius:999px;padding:1px 8px;font-size:11px;}
  #tray{
    display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
    background:var(--panel);border:1px solid var(--cell-edge);border-radius:14px;padding:10px;
    min-height:84px;
  }
  .tray-slot{position:relative;aspect-ratio:1/1;
    border-radius:12px;border:1px dashed transparent;
    background:radial-gradient(120% 120% at 50% 20%,#1d1740,#15102f 75%);}
  .tray-slot.empty{border-color:#2a2350;background:none;}
  /* 선반은 기울기 없이 똑바로(보드만 2.5D) */
  .tray-slot .hero{position:absolute;inset:0;}
  .tray-slot .stand{transform:none;}

  /* ---- buttons ---- */
  .btn-row{display:flex;gap:8px;margin-top:14px;}
  .btn{flex:1;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:bold;
    cursor:pointer;color:#fff;letter-spacing:.5px;transition:transform .08s,filter .15s;}
  .btn:active{transform:translateY(1px) scale(.99);}
  .btn-fight{background:linear-gradient(180deg,#ff7a59,#e5564a);box-shadow:0 6px 18px rgba(229,86,74,.4);}
  .btn-ghost{background:var(--panel-2);border:1px solid var(--cell-edge);color:var(--ink);}
  .btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.4);}

  .hint{font-size:11px;color:var(--ink-dim);text-align:center;margin-top:8px;line-height:1.5;}
  .hint b{color:var(--gold);}

  /* ---- log ---- */
  #log{margin-top:12px;background:var(--panel);border:1px solid var(--cell-edge);
    border-radius:12px;padding:8px 10px;font-size:12px;line-height:1.5;color:var(--ink-dim);
    max-height:108px;overflow-y:auto;}
  #log .e{margin:1px 0;}
  #log .e b{color:var(--ink);}
  #log .e.hot b{color:var(--gold);}

  /* ---- toast ---- */
  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(12px);
    background:rgba(20,15,40,.96);border:1px solid #4a3a7a;color:var(--ink);
    padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.4;max-width:300px;
    text-align:center;z-index:80;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
    box-shadow:0 10px 30px rgba(0,0,0,.5);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast b{color:var(--gold);}

  /* ---- battle overlay ---- */
  #battle{position:fixed;inset:0;background:#0a0814;display:none;
    flex-direction:column;align-items:center;justify-content:flex-start;z-index:50;padding:12px;
    overflow-y:auto;}
  #battle.show{display:flex;}
  .battle-head{width:100%;max-width:430px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .battle-head .t{font-weight:bold;font-size:15px;}
  .battle-head .t b{color:var(--gold);}
  .hpwrap{margin-left:auto;display:flex;gap:14px;font-size:12px;}
  .hpwrap .a{color:#5fe08a;}.hpwrap .e{color:#ff8a7a;}
  #arena-wrap{position:relative;width:100%;max-width:430px;background:#0c1430;border:1px solid #2a3a66;
    border-radius:16px;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.6);}
  #arena{display:block;width:100%;background:
    radial-gradient(600px 360px at 50% 0%, #16264e 0%, transparent 60%),#0a1026;}
  .result{position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:rgba(8,6,18,.78);border-radius:16px;padding:16px;}
  .result.show{display:flex;animation:pop .5s ease;}
  .result h1{font-size:40px;margin:0 0 4px;}
  .result.win h1{color:var(--gold);text-shadow:0 0 24px var(--gold);}
  .result.lose h1{color:#ff8a7a;}
  .result p{color:var(--ink-dim);margin:0 0 16px;font-size:13px;}
  .result .btn-row{width:100%;max-width:300px;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">유키렌 <b>퍼즐R&D</b> · Battle Feedback 01</div>
    <div class="stage-chip">STAGE <span class="num" id="stageNum">1</span>/10</div>
  </div>
  <p class="title-strap">성장 문양으로 파티를 빚는 퍼즐 RPG · 전술판 위에 용사 말을 빚는다</p>

  <div class="statusbar">
    <div class="stat">
      <span class="k">보드</span><span class="v" id="boardUse">0/16</span>
      <div class="boardbar"><div class="boardbar-fill" id="boardBar"></div></div>
    </div>
    <div class="stat"><span class="k">출전 예정</span><span class="v" id="deployCount">0명</span></div>
    <div class="stat"><span class="k">이번 제공</span><span class="v" id="provideCount">5/5</span></div>
  </div>
  <div class="last-result" id="lastResult" style="display:none;"></div>

  <div class="board-stage">
    <div class="board-slab">
      <div id="board"></div>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="section-label">제공 영웅 (고정 5개) <span class="count" id="trayCount">5</span></div>
  <div id="tray"></div>

  <div class="btn-row">
    <button class="btn btn-ghost" id="autoBtn">자동 배치 (테스트용)</button>
    <button class="btn btn-fight" id="fightBtn">전투 시작 ⚔</button>
  </div>

  <p class="hint" id="hint">선반 말 탭 → 빈칸에 <b>얹기</b>, 같은 직업·같은 성급 위에 올리면 <b>머지</b>(성급↑·레벨 합산·문양 성장).<br>이미 배치된 말은 빈칸으로 옮길 수 없고 <b>머지만</b> 가능. 사제는 공격하지 않고 <b>회복만 지원</b>.</p>

  <div class="section-label">로그</div>
  <div id="log"></div>
</div>

<div id="toast"></div>

<!-- battle -->
<div id="battle">
  <div class="battle-head">
    <div class="t">전투 — STAGE <b id="bStage">1</b></div>
    <div class="hpwrap">
      <span class="a" id="bAlly">0</span>
      <span class="e" id="bEnemy">0</span>
    </div>
  </div>
  <div id="arena-wrap">
    <canvas id="arena" width="406" height="560"></canvas>
    <div class="result" id="result">
      <h1 id="resTitle">승리!</h1>
      <p id="resText"></p>
      <div class="btn-row">
        <button class="btn btn-ghost" id="restartBtn" style="display:none;">다시 시작</button>
        <button class="btn btn-fight" id="nextBtn">다음 스테이지 →</button>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
/* =========================================================
   유키렌 퍼즐R&D 2탄 — Board Readability 01 + Pattern Rule Update 01
   베이스: run_balance_01 (코어/전투/사망매칭 유지)
   이번 개편: 문양 교정 · 사제 지원화 · 2.5D 보드 · 직업별 부유 말/아바타
            · 선택→머지/성장 미리보기 · 배치 말 이동 제한
   ========================================================= */

// ---------- 직업 정의 ----------
// glyph = 범례/로그용 명칭(최신 규칙 반영)
const JOBS = {
  warrior:{ name:"전사", color:"var(--warrior)", glyph:"상하",
            base:{hp:60, atk:10}, growHp:14, growAtk:2.2 },
  archer: { name:"궁수", color:"var(--archer)", glyph:"좌우",
            base:{hp:34, atk:9},  growHp:7,  growAtk:2.4 },
  priest: { name:"사제", color:"var(--priest)", glyph:"십자 지원",
            base:{hp:48, atk:6},  growHp:11, growAtk:1.4 },
  rogue:  { name:"도적", color:"var(--rogue)",  glyph:"뒤 대각",
            base:{hp:38, atk:11}, growHp:8,  growAtk:2.6 },
  mage:   { name:"마법사", color:"var(--mage)",  glyph:"앞 대각",
            base:{hp:28, atk:14}, growHp:5,  growAtk:3.4 },
};
const JOB_KEYS = Object.keys(JOBS);
const JOB_HEX = { warrior:'#e5564a', archer:'#39c46f', priest:'#ffd54a', rogue:'#a06bff', mage:'#3aa6ff' };

// ---------- 성장 문양 (머지 위치 기준 상대 좌표 [dr,dc]) ----------
//  세계선 교정 반영:
//   전사 상하 / 궁수 좌우 / 사제 인접 십자 (유지)
//   도적 = 뒤 대각 2칸 [+1,-1],[+1,+1]   (구버전 대각 4칸에서 변경)
//   마법사 = 앞 대각 2칸 [-1,-1],[-1,+1]  (구버전 ±2 십자에서 변경)
const GLYPH = {
  warrior:[[-1,0],[1,0]],                       // 상하
  archer :[[0,-1],[0,1]],                        // 좌우
  rogue  :[[1,-1],[1,1]],                        // 뒤 대각 2칸
  mage   :[[-1,-1],[-1,1]],                      // 앞 대각 2칸
  priest :[[-1,0],[1,0],[0,-1],[0,1]],           // 인접 십자
};

// ---------- 상태 ----------
const SIZE = 4;
const BOARD_CAP = SIZE*SIZE;   // 16칸
const TRAY_SIZE = 5;           // 매 스테이지 고정 제공 수
let board = [];           // 16칸, hero | null
let tray = [];            // 제공 영웅
let stage = 1;
const MAX_STAGE = 10;     // 총 10스테이지
let selected = null;      // {from:'tray'|'board', index}
let uid = 0;
let lastResult = null;    // {survived, died} 직전 전투 결과
// 디버그: true로 바꾸면 빈칸마다 "행,열" 좌표 표시(16칸 가시성 점검용). 평소 false.
const SHOW_CELL_COORDS = false;

// ---------- 영웅 스탯 계산 ----------
function statsFor(job, star, level){
  const j = JOBS[job];
  const starMul = 1 + (star-1)*0.6;             // 성급: 주 성장 축 (1★1.0 / 2★1.6 / 3★2.2 / 4★2.8)
  // 레벨 효과 완화: 공격은 레벨 10당 +1, HP는 완만(기존 성장폭의 ~30%)
  const atkFlat = j.base.atk + Math.floor((level-1)/10);
  const hpFlat  = j.base.hp + (level-1) * (j.growHp*0.3);
  const maxHp = Math.round(hpFlat * starMul);
  const atk   = +(atkFlat * starMul).toFixed(1);
  return { maxHp, atk };
}
function makeHero(job, star=1, level=1){
  const s = statsFor(job, star, level);
  return { id:++uid, job, star, level, maxHp:s.maxHp, hp:s.maxHp, atk:s.atk };
}
function refreshStats(h){
  const s = statsFor(h.job, h.star, h.level);
  h.maxHp = s.maxHp; h.atk = s.atk; h.hp = s.maxHp;
}

// ---------- 보드 좌표 ----------
const rc = i => [Math.floor(i/SIZE), i%SIZE];
const idx = (r,c) => r*SIZE + c;
const inBoard = (r,c) => r>=0 && r<SIZE && c>=0 && c<SIZE;

// ---------- 색 보조 ----------
function shade(col, amt){
  if(col.startsWith('var')) return '#555';
  let c=col.replace('#',''); if(c.length===3) c=c.split('').map(x=>x+x).join('');
  let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  r=Math.round(Math.min(255,Math.max(0,r+255*amt)));
  g=Math.round(Math.min(255,Math.max(0,g+255*amt)));
  b=Math.round(Math.min(255,Math.max(0,b+255*amt)));
  return `rgb(${r},${g},${b})`;
}

// ---------- 로그 / 토스트 ----------
function log(html, hot=false){
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'e'+(hot?' hot':'');
  d.innerHTML = html;
  el.prepend(d);
  while(el.children.length>40) el.removeChild(el.lastChild);
}
let toastTimer=null;
function toast(html){
  const t=document.getElementById('toast');
  t.innerHTML=html; t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1900);
}

// ---------- 렌더: 보드 ----------
function renderBoard(){
  const bd = document.getElementById('board');
  bd.innerHTML='';
  for(let i=0;i<BOARD_CAP;i++){
    const cell = document.createElement('div');
    cell.className='cell';
    cell.dataset.i = i;
    cell.addEventListener('click',()=>onCellTap(i));
    const h = board[i];
    if(h){
      const he = heroEl(h, ()=>onBoardHeroTap(i));
      if(selected && selected.from==='board' && selected.index===i) he.classList.add('selected');
      cell.appendChild(he);
    } else if(SHOW_CELL_COORDS){
      // 디버그: 빈칸에 행,열 좌표(가시성 점검용). 평소 OFF.
      const [r,c]=rc(i);
      const cd=document.createElement('div');
      cd.className='coord'; cd.textContent=`${r+1},${c+1}`;
      cell.appendChild(cd);
    }
    bd.appendChild(cell);
  }
  applyHighlights();
}

// ---------- 렌더: 영웅 토큰 (부유 말/아바타) ----------
// 직업별 머리 장식 + 무기 조각을 조립. 성급은 클래스 s1~s4로 외형 단계 제어.
function ornamentHTML(job){
  switch(job){
    case 'warrior': return `<div class="ornament helm"></div>`;
    case 'archer' : return `<div class="ornament band"></div>`;
    case 'priest' : return `<div class="ornament halo"></div>`;
    case 'rogue'  : return `<div class="ornament hood"></div>`;
    case 'mage'   : return `<div class="ornament wizhat"></div>`;
  }
  return '';
}
function weaponHTML(job){
  switch(job){
    case 'warrior': return `<div class="weapon sword"></div>`;
    case 'archer' : return `<div class="weapon bow"></div>`;
    case 'priest' : return `<div class="weapon staff"></div>`;
    case 'rogue'  : return `<div class="weapon dagger"></div>`;
    case 'mage'   : return `<div class="weapon orb"></div>`;
  }
  return '';
}
function heroEl(h, onClick){
  const hex = JOB_HEX[h.job];
  const el = document.createElement('div');
  el.className = `hero s${h.star} job-${h.job}`;
  el.style.setProperty('--hc', hex);
  el.dataset.id = h.id;
  el.innerHTML =
    `<div class="ground"></div>`+
    `<div class="stand"><div class="float">`+
      `<div class="fig">`+
        `<div class="aura"></div>`+
        `<div class="cape"></div>`+
        `<div class="body"></div>`+
        `<div class="shoulders"></div>`+
        `<div class="head"></div>`+
        ornamentHTML(h.job)+
        weaponHTML(h.job)+
        `<div class="crown"></div>`+
        `<div class="stars">${'★'.repeat(h.star)}</div>`+
      `</div>`+
      `<div class="lvl">Lv<b>${h.level}</b></div>`+
    `</div></div>`+
    `<div class="wave"></div><div class="flash"></div>`;
  if(onClick) el.addEventListener('click',(e)=>{e.stopPropagation();onClick();});
  return el;
}

// ---------- 렌더: 선반 ----------
function renderTray(){
  const t = document.getElementById('tray');
  t.innerHTML='';
  for(let i=0;i<TRAY_SIZE;i++){
    const slot = document.createElement('div');
    slot.className='tray-slot';
    const h = tray[i];
    if(h){
      const he = heroEl(h, ()=>onTrayTap(i));
      if(selected && selected.from==='tray' && selected.index===i) he.classList.add('selected');
      slot.appendChild(he);
    } else { slot.classList.add('empty'); }
    t.appendChild(slot);
  }
  const left = tray.filter(Boolean).length;
  document.getElementById('trayCount').textContent = left;
  document.getElementById('autoBtn').disabled = left===0 || !hasEmptyOrMerge();
  updateStatusHud();
}

// ---------- 렌더: 범례 ----------
function renderLegend(){
  const wrap = document.getElementById('legend');
  wrap.innerHTML='';
  JOB_KEYS.forEach(k=>{
    const j = JOBS[k];
    const d = document.createElement('div');
    d.className='j';
    d.innerHTML = `<span class="dot" style="background:${JOB_HEX[k]}"></span>`+
                  `<div>${j.name}</div><div class="pat">${j.glyph}</div>`;
    wrap.appendChild(d);
  });
}

// ---------- 선택 / 하이라이트 ----------
function selectedHero(){
  if(!selected) return null;
  return selected.from==='tray' ? tray[selected.index] : board[selected.index];
}
function cellAt(i){ return document.querySelector(`#board .cell[data-i="${i}"]`); }

function markGlyphAt(pos, job){
  const [r,c] = rc(pos);
  const hex = JOB_HEX[job];
  GLYPH[job].forEach(([dr,dc])=>{
    const nr=r+dr, nc=c+dc;
    if(!inBoard(nr,nc)) return;
    const cell = cellAt(idx(nr,nc));
    if(!cell) return;
    cell.classList.add('glyph-hi');
    cell.style.setProperty('--glyph', hex);
  });
}

function applyHighlights(){
  // 초기화
  document.querySelectorAll('#board .cell').forEach(c=>{
    c.classList.remove('glyph-hi','drop-ok','merge-ok');
    c.style.removeProperty('--glyph');
  });
  const h = selectedHero();
  if(!h) return;

  const mergeTargets = [];
  for(let i=0;i<BOARD_CAP;i++){
    if(selected.from==='board' && selected.index===i) continue;  // 자기 자신 제외
    const occ = board[i];
    if(!occ){
      // 빈칸 배치는 '선반 말'만 가능 (배치된 말은 빈칸 이동 불가)
      if(selected.from==='tray') cellAt(i).classList.add('drop-ok');
    } else if(occ.job===h.job && occ.star===h.star && occ.star<4){
      mergeTargets.push(i);
    }
  }
  // 1) 각 머지 대상 기준 성장 문양 칸 먼저 표시(직업색 빛)
  mergeTargets.forEach(t=> markGlyphAt(t, h.job));
  // 2) 머지 대상 칸은 금색 링(가장 강조)으로 — glyph 위에 덮어쓰기
  mergeTargets.forEach(t=>{
    const cell = cellAt(t);
    cell.classList.remove('glyph-hi');
    cell.classList.add('merge-ok');
  });

  // 머지 대상이 하나도 없고 보드 말을 골랐다면, 그 말의 문양을 자기 위치 기준으로 보여줘 학습 보조
  if(mergeTargets.length===0 && selected.from==='board'){
    markGlyphAt(selected.index, h.job);
  }
}

// ---------- 배치 / 머지 핵심 ----------
function tryPlaceOrMerge(target){
  const src = selected;
  if(!src) return;
  const moving = src.from==='tray' ? tray[src.index] : board[src.index];
  if(!moving) { selected=null; renderAll(); return; }

  // 자기 자신 탭 → 선택 해제
  if(src.from==='board' && src.index===target){ selected=null; renderAll(); return; }

  const occ = board[target];

  if(!occ){
    // 빈칸: 선반 말만 배치 가능. 배치된 말은 이동 불가(머지만).
    if(src.from==='board'){
      log(`이동 불가 — 이미 배치된 말은 빈칸으로 옮길 수 없음. <b>머지 가능한 대상</b>에게만 합체 가능`);
      toast(`이미 배치된 말은 빈칸으로 이동할 수 없습니다.<br><b>머지 가능한 대상</b>에게만 합체할 수 있습니다.`);
      // 선택 유지 → 바로 머지 대상을 고를 수 있게
      renderAll();
      return;
    }
    board[target] = moving;
    tray[src.index]=null;
    selected=null;
    renderAll();
    animPlace(target);
    log(`<b>${JOBS[moving.job].name}</b> ${'★'.repeat(moving.star)} Lv${moving.level} 배치`);
    return;
  }

  // 머지 조건
  if(occ.job===moving.job && occ.star===moving.star && occ.star<4){
    doMerge(target, moving, src);
  } else if(occ.job===moving.job && occ.star>=4){
    log(`4성은 더 이상 승급 불가`, false);
    toast(`4성은 더 이상 승급할 수 없습니다.`);
    selected=null; renderAll();
  } else {
    log(`머지 불가 — 같은 직업·같은 성급만 합체 가능`);
    toast(`머지 불가 — 같은 직업·같은 성급만 합체할 수 있습니다.`);
    selected=null; renderAll();
  }
}

function doMerge(pos, incoming, src){
  const base = board[pos];
  const newLevel = base.level + incoming.level;
  const newStar = Math.min(4, base.star+1);
  const merged = makeHero(base.job, newStar, newLevel);

  board[pos] = merged;
  if(src.from==='tray') tray[src.index]=null; else board[src.index]=null;
  selected=null;

  renderAll();
  animMerge(pos);

  const j = JOBS[merged.job];
  log(`💥 <b>${j.name}</b> 머지! ${'★'.repeat(base.star)}→${'★'.repeat(newStar)} · `+
      `Lv${base.level}+${incoming.level} → <b>Lv${newLevel}</b> 탄생 → ${j.glyph} 대상 +1 성장`, true);

  propagateGrowth(pos, merged);
}

function propagateGrowth(pos, merged){
  const [r,c] = rc(pos);
  const j = JOBS[merged.job];
  const gain = 1;                     // 성장 전파: +1 고정 (레벨 폭주 방지 실험). 머지 당사자 레벨 합산은 doMerge에서 유지.
  let touched = 0;
  GLYPH[merged.job].forEach(([dr,dc])=>{
    const nr=r+dr, nc=c+dc;
    if(!inBoard(nr,nc)) return;
    const tIdx = idx(nr,nc);
    const ally = board[tIdx];
    if(!ally) return;                 // 빈칸 무시
    ally.level += gain;
    refreshStats(ally);
    touched++;
    setTimeout(()=>animGrowth(tIdx, JOB_HEX[merged.job]), 180);
    log(`　↳ <b>${JOBS[ally.job].name}</b>(${j.glyph}) +${gain} → Lv${ally.level}`);
  });
  if(touched===0){
    log(`　↳ ${j.glyph} 문양 대상 아군 없음`);
  } else {
    setTimeout(renderBoard, 360);
  }
}

function hasEmptyOrMerge(){
  for(let i=0;i<BOARD_CAP;i++) if(!board[i]) return true;
  const left = tray.filter(Boolean);
  return left.some(h => board.some(b=>b&&b.job===h.job&&b.star===h.star&&b.star<4));
}
function autoPlace(){
  // 트레이 첫 영웅 1개만, '빈칸 우선'으로 대충 배치 (머지를 우선 노리지 않음 → 비최적).
  const ti = tray.findIndex(Boolean);
  if(ti<0) return;
  const h = tray[ti];
  let target = board.findIndex(b=>!b);                 // 빈칸 먼저
  if(target<0) target = board.findIndex(b=>b&&b.job===h.job&&b.star===h.star&&b.star<4); // 꽉 찼을 때만 머지
  if(target<0){ log(`⚠ 보드 가득 참 — 자동 배치 불가. 머지로 공간을 비워야 함`); return; }
  selected = {from:'tray', index:ti};
  tryPlaceOrMerge(target);
}

// ---------- 몬스터 구성 (10스테이지 단계적 강화, 밸런스 유지) ----------
function monstersFor(s){
  const mk = (kind,hp,atk,size,color,speed,boss)=>({kind,hp,maxHp:hp,atk,size,color,speed,boss:!!boss});
  const slime  = (hp,atk)=>mk('슬라임',hp,atk,15,'#7fd17f',1.3);
  const goblin = (hp,atk)=>mk('고블린',hp,atk,17,'#c79a5b',1.6);
  const orc    = (hp,atk)=>mk('오크',  hp,atk,20,'#b06a4a',1.4);
  const wraith = (hp,atk)=>mk('망령',  hp,atk,18,'#6a8fd6',1.7);
  switch(s){
    // 1~2: 짧게 끝나되 즉시 삭제되지는 않게 (HP 소폭 ↑)
    case 1: return [ slime(70,5), slime(70,5), slime(70,5) ];
    case 2: return [ slime(95,6), slime(95,6), slime(95,6), slime(95,6) ];
    // 3~6: 수량·HP 점진 증가
    case 3: return [ goblin(120,10), goblin(120,10), slime(95,7), slime(95,7), slime(95,7) ];
    case 4: return [ goblin(150,12), goblin(150,12), orc(190,15), slime(110,9), slime(110,9) ];
    case 5: return [ orc(210,16), orc(210,16), goblin(150,13), goblin(150,13), slime(120,10) ];
    case 6: return [ orc(240,18), orc(240,18), wraith(180,17), wraith(180,17), goblin(160,15) ];
    // 7~9: 정예/망령 수량 ↑ — 사망 손실/소모전 체감
    case 7: return [ orc(280,20), orc(280,20), orc(280,20), wraith(210,19), wraith(210,19), goblin(170,16) ];
    case 8: return [ orc(320,22), orc(320,22), orc(320,22), wraith(250,21), wraith(250,21), goblin(190,18), goblin(190,18) ];
    case 9: return [ mk('정예오크',380,25,24,'#9a4a3a',1.4), mk('정예오크',380,25,24,'#9a4a3a',1.4),
                     orc(300,22), wraith(260,23), wraith(260,23), wraith(260,23), goblin(210,20) ];
    // 10: 마왕 보스전 — 완화된 아군 스케일 기준으로 HP 재조정(1400→900)
    case 10: {
      const arr=[ mk('마왕',900,30,46,'#a23bff',0.9,true) ];
      arr.push(mk('정예오크',360,24,24,'#9a4a3a',1.4), mk('정예오크',360,24,24,'#9a4a3a',1.4));
      for(let i=0;i<3;i++) arr.push(wraith(220,20));
      return arr;
    }
  }
  return [];
}

function collideRamp(a, r){
  const dx=r.x2-r.x1, dy=r.y2-r.y1;
  const len2=dx*dx+dy*dy;
  let t=((a.x-r.x1)*dx+(a.y-r.y1)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  const cx=r.x1+t*dx, cy=r.y1+t*dy;
  const ddx=a.x-cx, ddy=a.y-cy;
  const dist=Math.hypot(ddx,ddy);
  if(dist < a.r && dist>0.001){
    const nx=ddx/dist, ny=ddy/dist;
    const overlap=a.r-dist;
    a.x+=nx*overlap; a.y+=ny*overlap;
    const vn=a.vx*nx+a.vy*ny;
    if(vn<0){ a.vx-=(1+a.rest)*vn*nx; a.vy-=(1+a.rest)*vn*ny; }
  }
}

function spawnDeath(a){
  const n = a.team==='ally' ? 14 : 10;
  for(let k=0;k<n;k++){
    const ang=Math.random()*Math.PI*2, sp=1+Math.random()*3;
    particles.push({x:a.x,y:a.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      t:26, color:a.color, r:2+Math.random()*2.2});
  }
  pulses.push({x:a.x,y:a.y,r:a.r,max:a.r*2.2,t:14,life:14,color:a.team==='ally'?'#fff':'#ff7a6a',ring:true});
}

const floaters=[];
function dealDamage(att, def, dmg, critical){
  def.hp -= dmg;
  def.hit = 8;
  if(att && att.team==='ally' && att.stat) att.stat.dmg += dmg;   // 딜 집계
  floaters.push({x:def.x,y:def.y-def.r-2,t:30,v:(critical?'✦':'')+Math.round(dmg),
    color: critical?'#ffd34d':(att.team==='ally'?'#ffe27a':'#ff9a8a'),
    big:!!critical});
}

function step(){
  const air=0.992;

  for(const a of actors){
    if(a.state!=='live'){
      a.respawn--;
      if(a.respawn<=0){
        const p = a.team==='ally'?allyInlet():enemyInlet();
        a.x=p.x; a.y=p.y; a.vx=(Math.random()-.4)*1.6; a.vy=1+Math.random();
        a.state='live';
      }
    }
  }

  for(const a of actors){
    if(a.state!=='live') continue;
    a.vy += GRAV * (a.mass>1.6?1.15:1);
    a.x+=a.vx; a.y+=a.vy;
    a.vx*=air; a.vy*=air;
    if(a.hitCd>0)a.hitCd--;
    if(a.abCd>0)a.abCd--;
    a.hit=Math.max(0,(a.hit||0)-1);

    if(a.x<a.r){a.x=a.r;a.vx=Math.abs(a.vx)*a.rest;}
    if(a.x>W-a.r){a.x=W-a.r;a.vx=-Math.abs(a.vx)*a.rest;}
    if(a.y<a.r){a.y=a.r;a.vy=Math.abs(a.vy)*a.rest;}

    for(const r of ramps) collideRamp(a,r);
    for(const p of pins){
      const dx=a.x-p.x, dy=a.y-p.y, d=Math.hypot(dx,dy), min=a.r+p.r;
      if(d<min && d>0.001){
        const nx=dx/d, ny=dy/d, ov=min-d;
        a.x+=nx*ov; a.y+=ny*ov;
        const vn=a.vx*nx+a.vy*ny;
        if(vn<0){ a.vx-=(1+0.95)*vn*nx; a.vy-=(1+0.95)*vn*ny; }
        a.vx+=nx*1.2; a.vy+=ny*1.2;
        p.hot=8;
      }
    }

    if(a.y > H - a.r){
      if(Math.abs(a.x-drainX) < drainW/2 + a.r*0.5){
        a.state='drain';
        a.respawn = 30 + Math.floor(Math.random()*30);
      } else {
        a.y=H-a.r; a.vy=-Math.abs(a.vy)*a.rest;
      }
    }
    if(a.team==='ally' && a.ability && a.abCd===0){ runAbility(a); }
  }

  const live = actors.filter(a=>a.state==='live');
  for(let i=0;i<live.length;i++){
    for(let j=i+1;j<live.length;j++){
      const a=live[i], b=live[j];
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy), min=a.r+b.r;
      if(d<min && d>0.001){
        const nx=dx/d, ny=dy/d, ov=(min-d);
        const ima=1/a.mass, imb=1/b.mass, tot=ima+imb;
        a.x-=nx*ov*(ima/tot); a.y-=ny*ov*(ima/tot);
        b.x+=nx*ov*(imb/tot); b.y+=ny*ov*(imb/tot);
        const kick=1.1*(a.push+b.push)/2;
        a.vx-=nx*kick*(ima/tot)*2; a.vy-=ny*kick*(ima/tot)*2;
        b.vx+=nx*kick*(imb/tot)*2; b.vy+=ny*kick*(imb/tot)*2;
        if(a.team!==b.team){ contactDamage(a,b); contactDamage(b,a); }
      }
    }
  }

  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx; p.y+=p.vy; p.t--;
    let hitSomething=false;
    for(const e of live){
      if(e.team===p.team) continue;
      if(Math.hypot(e.x-p.x,e.y-p.y) < e.r+3){
        dealDamage(p.owner||{team:p.team}, e, p.dmg, false);
        hitSomething=true; break;
      }
    }
    if(hitSomething || p.t<=0 || p.x<0||p.x>W||p.y<0||p.y>H) projectiles.splice(i,1);
  }

  for(let i=pulses.length-1;i>=0;i--){ if(--pulses[i].t<=0) pulses.splice(i,1); }
  for(let i=particles.length-1;i>=0;i--){
    const f=particles[i]; f.x+=f.vx; f.y+=f.vy; f.vy+=0.12; f.t--;
    if(f.t<=0) particles.splice(i,1);
  }
  for(let i=floaters.length-1;i>=0;i--){ const f=floaters[i]; f.t--; f.y-=0.7; if(f.t<=0) floaters.splice(i,1); }

  // 아군 생존 프레임 집계 (살아있는 동안 누적 → 최장 생존 판정)
  for(const a of actors){ if(a.team==='ally' && a.hp>0 && a.stat) a.stat.frames++; }

  const before=actors.length;
  for(const a of actors){ if(a.hp<=0 && !a.dead){ a.dead=true; if(a.team==='ally'&&a.stat) a.stat.killed=true; spawnDeath(a); } }
  actors=actors.filter(a=>!a.dead);
  if(actors.length!==before) updateHpHud();

  battleFrames++;
  const allyActors  = actors.filter(a=>a.team==='ally');
  const enemyActors = actors.filter(a=>a.team==='enemy');
  if(enemyActors.length===0) { endBattle(true); return; }
  if(allyActors.length===0)  { endBattle(false); return; }
  if(battleFrames >= BATTLE_TIME_LIMIT){
    const allyHpRatio  = allyActors.reduce((s,a)=>s+a.hp/a.maxHp,0);
    const enemyHpRatio = enemyActors.reduce((s,a)=>s+a.hp/a.maxHp,0);
    timedOut = true;
    endBattle(allyHpRatio >= enemyHpRatio);
    return;
  }
}

function contactDamage(att, def){
  if(att.hitCd>0) return;
  // 사제는 직접 공격하지 않는 지원 직업
  if(att.team==='ally' && att.job==='priest') return;
  att.hitCd = 26;
  let dmg = att.atk * (KIT[att.job]?.atkMul ?? 1);
  let crit=false;
  if(att.team==='ally' && att.job==='rogue'){
    if(Math.random()<0.35){ dmg*=2.0; crit=true; }
    if(def.hp/def.maxHp < 0.35){ dmg*=1.4; }
  }
  if(dmg<=0) return;
  dealDamage(att, def, dmg, crit);
}

function runAbility(a){
  const live = actors.filter(x=>x.state==='live');
  if(a.ability==='shoot'){
    let tgt=null,best=1e9;
    for(const e of live){ if(e.team===a.team) continue;
      const d=Math.hypot(e.x-a.x,e.y-a.y); if(d<best){best=d;tgt=e;} }
    if(tgt && best<260){
      a.abCd=a.abCdMax;
      const ang=Math.atan2(tgt.y-a.y,tgt.x-a.x);
      projectiles.push({x:a.x,y:a.y,vx:Math.cos(ang)*5.5,vy:Math.sin(ang)*5.5,
        t:80,dmg:a.atk*1.5,team:a.team,owner:a});
    }
  } else if(a.ability==='heal'){
    // 사제: 가까운 아군 회복 파동 (강화 + 시각 강조)
    let healed=false;
    const healAmt = Math.round(a.atk*2.4 + 12 + a.star*4);
    for(const f of live){ if(f.team!=='ally'||f===a) continue;
      if(Math.hypot(f.x-a.x,f.y-a.y) < 110 && f.hp<f.maxHp){
        const before=f.hp;
        f.hp=Math.min(f.maxHp, f.hp + healAmt);
        const delta=f.hp-before;
        if(delta>0){ healed=true; if(a.stat) a.stat.heal += delta;
          floaters.push({x:f.x,y:f.y-f.r,t:30,v:'+'+Math.round(delta),color:'#7fffa0'}); }
      }
    }
    if(healed){
      a.abCd=a.abCdMax;
      pulses.push({x:a.x,y:a.y,r:8,max:110,t:20,life:20,color:'#9bffb0',ring:true,heal:true});
      floaters.push({x:a.x,y:a.y-a.r-6,t:26,v:'✚',color:'#bdffd0'});
    }
  } else if(a.ability==='blast'){
    let near=live.find(e=>e.team!==a.team && Math.hypot(e.x-a.x,e.y-a.y)<70);
    if(near){
      a.abCd=a.abCdMax;
      pulses.push({x:a.x,y:a.y,r:8,max:74,t:16,life:16,color:'#9a7bff',ring:true,fill:true});
      for(const e of live){ if(e.team===a.team) continue;
        if(Math.hypot(e.x-a.x,e.y-a.y)<74){ dealDamage(a,e,a.atk*1.3,false); }
      }
    }
  }
}

// 전투 직업 색/마크 — 캔버스용 (간단 표기 유지)
const BATTLE_MARK = { warrior:'⚔', archer:'➹', priest:'✚', rogue:'†', mage:'✦' };

function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.fillStyle='rgba(95,224,138,.12)'; ctx.fillRect(W*0.10,0,W*0.22,22);
  ctx.fillStyle='rgba(255,122,106,.12)'; ctx.fillRect(W*0.68,0,W*0.22,22);
  ctx.fillStyle='#5fe08a'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('아군 투입', W*0.21, 15);
  ctx.fillStyle='#ff8a7a'; ctx.fillText('적 투입', W*0.79, 15);

  ctx.strokeStyle='rgba(140,150,190,.45)'; ctx.lineWidth=4; ctx.lineCap='round';
  for(const r of ramps){ ctx.beginPath(); ctx.moveTo(r.x1,r.y1); ctx.lineTo(r.x2,r.y2); ctx.stroke(); }

  ctx.fillStyle='rgba(124,92,255,.15)';
  ctx.fillRect(drainX-drainW/2, H-40, drainW, 40);
  ctx.fillStyle='rgba(200,190,255,.6)'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  ctx.fillText('▼ 배출구', drainX, H-6);

  for(const p of pins){
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = p.hot>0 ? '#fff' : '#6f7bb5';
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1; ctx.stroke();
    if(p.hot>0) p.hot--;
  }

  // 파동
  for(const pl of pulses){
    const life = pl.life||18;
    const k=1-pl.t/life;
    const rr=pl.r + (pl.max-pl.r)*k;
    ctx.globalAlpha=Math.max(0,Math.min(1,pl.t/life));
    ctx.beginPath(); ctx.arc(pl.x,pl.y,rr,0,Math.PI*2);
    if(pl.fill){ ctx.fillStyle=pl.color; ctx.fill(); }
    else { ctx.strokeStyle=pl.color; ctx.lineWidth=2.5; ctx.stroke(); }
    if(pl.heal){
      ctx.strokeStyle='#d9ffe6'; ctx.lineWidth=2.4;
      const s=Math.max(4, rr*0.2);
      ctx.beginPath();
      ctx.moveTo(pl.x-s,pl.y); ctx.lineTo(pl.x+s,pl.y);
      ctx.moveTo(pl.x,pl.y-s); ctx.lineTo(pl.x,pl.y+s); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  for(const p of projectiles){
    ctx.beginPath(); ctx.arc(p.x,p.y,3.2,0,Math.PI*2);
    ctx.fillStyle='#bdffd0'; ctx.fill();
  }

  for(const a of actors){
    if(a.state!=='live'){
      const p = a.team==='ally'?{x:W*0.21,y:30}:{x:W*0.79,y:30};
      ctx.globalAlpha=0.4;
      ctx.beginPath(); ctx.arc(p.x+(Math.random()-.5)*6, p.y, 3,0,Math.PI*2);
      ctx.fillStyle=a.color; ctx.fill(); ctx.globalAlpha=1;
      continue;
    }
    ctx.beginPath(); ctx.ellipse(a.x,a.y+a.r*0.85,a.r*0.8,a.r*0.28,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fill();

    ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
    const g=ctx.createRadialGradient(a.x-a.r*0.3,a.y-a.r*0.4,1,a.x,a.y,a.r);
    g.addColorStop(0,'rgba(255,255,255,.7)');
    g.addColorStop(0.25, a.hit?'#fff':a.color);
    g.addColorStop(1, shade(a.color,-0.35));
    ctx.fillStyle=g; ctx.fill();
    ctx.lineWidth=a.team==='ally'?3:2;
    ctx.strokeStyle=a.team==='ally'?'#ffffff':'rgba(0,0,0,.4)';
    ctx.stroke();
    if(a.team==='ally'){
      ctx.lineWidth=1.5; ctx.strokeStyle='rgba(180,200,255,.5)';
      ctx.beginPath(); ctx.arc(a.x,a.y,a.r+2,0,Math.PI*2); ctx.stroke();
    }

    if(a.team==='ally'){
      const mk = BATTLE_MARK[a.job]||'•';
      ctx.font=`bold ${Math.round(a.r*1.02)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.lineWidth=2.4; ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.strokeText(mk,a.x,a.y+1);
      ctx.fillStyle='#15121f'; ctx.fillText(mk,a.x,a.y+1);
      if(a.star>=3){
        ctx.strokeStyle = a.star>=4 ? 'rgba(124,92,255,.8)':'rgba(255,211,77,.6)';
        ctx.lineWidth = a.star>=4?3:2;
        ctx.beginPath(); ctx.arc(a.x,a.y,a.r+4,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle = a.star>=4?'#c6b3ff':'#ffd34d'; ctx.font='8px sans-serif';
        ctx.fillText('★'.repeat(a.star), a.x, a.y-a.r-7);
      }
    } else if(a.boss){
      ctx.strokeStyle='rgba(162,59,255,.5)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(a.x,a.y,a.r+6,0,Math.PI*2); ctx.stroke();
    }

    const bw=a.r*2, bh = a.team==='ally' ? Math.min(6,3+a.star) : 4;
    const bx=a.x-a.r, by=a.y-a.r-9;
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=a.team==='ally'?'#5fe08a':'#ff7a6a';
    ctx.fillRect(bx,by,bw*Math.max(0,a.hp/a.maxHp),bh);
  }

  for(const f of particles){
    ctx.globalAlpha=Math.max(0,f.t/24);
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.fillStyle=f.color; ctx.fill(); ctx.globalAlpha=1;
  }
  for(const f of floaters){
    ctx.globalAlpha=Math.max(0,f.t/30);
    ctx.fillStyle=f.color; ctx.font=`bold ${f.big?16:13}px sans-serif`; ctx.textAlign='center';
    ctx.fillText(f.v,f.x,f.y); ctx.globalAlpha=1;
  }
}

function loop(){
  if(battleOver) return;
  step(); draw();
  raf=requestAnimationFrame(loop);
}

function statLabel(s){ return `${JOBS[s.job].name} ${'★'.repeat(s.star)} Lv${s.level}`; }
function pickMVP(stats){
  const byDmg  = stats.filter(s=>s.dmg>0).sort((a,b)=>b.dmg-a.dmg);
  const byHeal = stats.filter(s=>s.heal>0).sort((a,b)=>b.heal-a.heal);
  const byLong = stats.slice().sort((a,b)=>b.frames-a.frames);
  return { dmg:byDmg[0]||null, heal:byHeal[0]||null, long:byLong[0]||null };
}
function endBattle(win){
  if(battleOver) return;
  battleOver=true;
  if(raf) cancelAnimationFrame(raf);
  draw();

  // ----- boardIdx 기준 집계 (사망 수 = 보드에서 제거될 수) -----
  const survivorCells = battleStats.filter(s=>!s.killed).map(s=>s.boardIdx);
  const deathCells    = battleStats.filter(s=> s.killed).map(s=>s.boardIdx);
  const survived = survivorCells.length;
  const died     = deathCells.length;
  const deathByJob={}; battleStats.filter(s=>s.killed).forEach(s=>{ deathByJob[s.job]=(deathByJob[s.job]||0)+1; });
  const mvp = pickMVP(battleStats);
  const headText = win ? (stage>=MAX_STAGE ? '🏆 CLEAR' : `STAGE ${stage} 승리`)
                       : (survived>0 ? `STAGE ${stage} 패배` : `STAGE ${stage} 전멸`);
  lastBattle = { stage, deployed:deployCountAtStart, survived, died, win, timedOut, deathByJob, deathCells, survivorCells, mvp };
  lastResult = { survived, died };

  // ----- 결과창 요약 -----
  const res=document.getElementById('result');
  const next=document.getElementById('nextBtn');
  const restart=document.getElementById('restartBtn');
  const toTag = timedOut ? ' · <span style="color:#ffb74d;">⏱시간종료</span>' : '';
  const line1 = `출전 <b>${deployCountAtStart}</b> · 생존 <b style="color:#5fe08a">${survived}</b> · 사망 <b style="color:#ff8a7a">${died}</b>${toTag}`;
  const mvpBlock =
    `<div style="margin-top:8px;font-size:12px;line-height:1.7;text-align:left;display:inline-block;">`+
    `⚔ 딜 기여: <b>${mvp.dmg?statLabel(mvp.dmg):'—'}</b>${mvp.dmg?` <span style="color:#9a8fc2">(${Math.round(mvp.dmg.dmg)} 피해)</span>`:''}<br>`+
    `✚ 회복 기여: <b>${mvp.heal?statLabel(mvp.heal):'—'}</b>${mvp.heal?` <span style="color:#9a8fc2">(${Math.round(mvp.heal.heal)} 회복)</span>`:''}<br>`+
    `🛡 최장 생존: <b>${mvp.long?statLabel(mvp.long):'—'}</b>`+
    `</div>`;
  const deathLine = died>0
    ? `<div style="margin-top:6px;font-size:12px;color:#ff9a8a;">☠ 사망: ${Object.entries(deathByJob).map(([j,n])=>`${JOBS[j].name} ${n}`).join(', ')}</div>`
    : '';

  document.getElementById('resTitle').textContent = headText;
  if(win){
    res.className='result win show';
    const tail = stage>=MAX_STAGE
      ? `<div style="margin-top:8px;">10스테이지 돌파 — 런 클리어!</div>`
      : `<div style="margin-top:8px;color:#9a8fc2;">살아남은 파티가 다음 스테이지로 누적됩니다.</div>`;
    document.getElementById('resText').innerHTML = line1 + mvpBlock + deathLine + tail;
    next.textContent = stage>=MAX_STAGE ? '처음부터 →' : '다음 스테이지 →';
    next.style.display='block';
  } else {
    res.className='result lose show';
    document.getElementById('resText').innerHTML = line1 + mvpBlock + deathLine +
      `<div style="margin-top:8px;color:#9a8fc2;">${survived>0?'전력을 보강해 다시 도전하세요.':'파티가 전멸했습니다. 다시 도전하세요.'}</div>`;
    restart.style.display='block';
  }

  // ----- 로그 (간결) -----
  log(`<b>${headText}</b> — 출전 ${deployCountAtStart} / 생존 ${survived} / 사망 ${died}${timedOut?' / ⏱시간종료':''}`, true);
  if(died>0)  log(`☠ 사망: ${Object.entries(deathByJob).map(([j,n])=>`${JOBS[j].name} ${n}`).join(', ')}`);
  if(mvp.dmg)  log(`⚔ MVP 딜러: ${statLabel(mvp.dmg)} (${Math.round(mvp.dmg.dmg)} 피해)`);
  if(mvp.heal) log(`✚ 회복 기여: ${statLabel(mvp.heal)} (${Math.round(mvp.heal.heal)} 회복)`);
}

// ---------- 전투 종료 후 흐름 (boardIdx 기반 정밀 사망 처리) ----------
function survivorsBackToBoard(){
  if(!lastBattle) return lastResult;
  // 사망 칸 비우기 + 생존 말 풀피 — boardIdx 기준이라 동일 직업/성급/레벨이 여러 개여도 정확
  lastBattle.deathCells.forEach(i=>{ board[i]=null; });
  lastBattle.survivorCells.forEach(i=>{ if(board[i]) board[i].hp=board[i].maxHp; });
  const free = BOARD_CAP - board.filter(Boolean).length;
  log(`전투 후 복귀 — 생존 ${lastBattle.survived} 보드 잔류 · 빈칸 ${free}개`);
  return lastResult;
}

// ---------- 전투 후 보드 복귀 연출 (사망 칸 붉은 pulse / 생존 말 반짝임) ----------
function playReturnFx(){
  if(!lastBattle) return;
  // 사망 칸: 붉은 그을림 pulse + 링/연기
  lastBattle.deathCells.forEach(i=>{
    const cell=cellAt(i); if(!cell) return;
    cell.classList.add('death-fx');
    const burst=document.createElement('div');
    burst.className='death-burst';
    burst.innerHTML='<span class="smoke"></span><span class="smoke s2"></span>';
    cell.appendChild(burst);
    setTimeout(()=>{ cell.classList.remove('death-fx'); burst.remove(); }, 1000);
  });
  // 생존 말: 초록/흰 반짝임 + 통통 (사제는 회복 지원 느낌 추가)
  lastBattle.survivorCells.forEach(i=>{
    const cell=cellAt(i); if(!cell) return;
    const hero=cell.querySelector('.hero'); if(!hero) return;
    hero.classList.add('return-fx');
    if(board[i] && board[i].job==='priest') hero.classList.add('heal-glow');
    setTimeout(()=>{ hero.classList.remove('return-fx','heal-glow'); }, 850);
  });
}

// ---------- 버튼 ----------
document.getElementById('fightBtn').addEventListener('click', startBattle);
document.getElementById('autoBtn').addEventListener('click', ()=>{ autoPlace(); });
document.getElementById('nextBtn').addEventListener('click', ()=>{
  battleEl.classList.remove('show');
  if(stage>=MAX_STAGE){
    board=new Array(BOARD_CAP).fill(null);
    lastResult=null; lastBattle=null;
    startStage(1);
  } else {
    survivorsBackToBoard();
    startStage(stage+1);
    // 보드 DOM 렌더 후 사망 칸 pulse / 생존 말 반짝임
    requestAnimationFrame(()=>requestAnimationFrame(playReturnFx));
  }
});
document.getElementById('restartBtn').addEventListener('click', ()=>{
  battleEl.classList.remove('show');
  newStageTray();
  log(`STAGE ${stage}/${MAX_STAGE} 재도전 — 영웅 ${TRAY_SIZE}개 재제공`);
  renderAll();
});

// ---------- 시작 ----------
renderLegend();
startStage(1);
</script>
</body>
</html>
